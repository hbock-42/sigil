name: sigil_workspace
publish_to: none

environment:
  sdk: ^3.8.0

workspace:
  - apps/sigil_server
  - apps/sigil_client
  - apps/sigil_flutter
  - packages/sigil_lints

dev_dependencies:
  melos: ^7.5.1

melos:
  categories:
    apps:
      - apps/**
    packages:
      - packages/**

  scripts:
    analyze:
      description: Run static analysis across all packages.
      exec: just --justfile mod.just analyze
      packageFilters:
        dirExists: lib

    test:
      description: Run tests across all packages.
      exec: just --justfile mod.just test
      packageFilters:
        dirExists: test

    format:
      description: Format all Dart files.
      exec: just --justfile mod.just format
      packageFilters:
        dirExists: lib

    generate:
      description: Run Serverpod code generation.
      exec: just --justfile mod.just generate
      packageFilters:
        scope:
          - sigil_server
