services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: sigil
      POSTGRES_PASSWORD: "F8VRXTBq54r_JW3bvgoau11CICCCd6ns"
    volumes:
      - sigil_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "zygPwDyxAbZfx8yENdd9KtaVtz3624ZS"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: sigil_test
      POSTGRES_PASSWORD: "M3VpcIadHH4FDJNu8R3q2sWydOgVbz6F"
    volumes:
      - sigil_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "vRGm4WnT-Acw_wl-fHhMfuqG0vwyS-Jj"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  sigil_data:
  sigil_test_data:
