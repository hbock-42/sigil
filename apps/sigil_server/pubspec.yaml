name: sigil_server
description: Starting point for a Serverpod server.
# version: 1.0.0
# homepage: https://www.example.com

environment:
  sdk: '^3.8.0'

resolution: workspace

dependencies:
  serverpod: 3.4.7
  serverpod_auth_idp_server: 3.4.7

dev_dependencies:
  custom_lint:
  very_good_analysis: ^7.0.0
  serverpod_test: 3.4.7
  sigil_lints:
    path: ../../packages/sigil_lints
  test: ^1.25.5

serverpod:
  scripts:
    # Starts the server and applies migrations
    start: dart bin/main.dart --apply-migrations

    # Build the Flutter web app and copy it to the server's web directory.
    # Windows uses xcopy since flutter's --output flag doesn't work there.
    # See: https://github.com/flutter/flutter/issues/157886
    flutter_build:
      windows: >-
        (if exist web\app rmdir /S /Q web\app)
        & cd /D ..\sigil_flutter
        && flutter build web --base-href /app/ --wasm
        && xcopy /E /I /Y build\web ..\sigil_server\web\app
      posix: |
        cd ../sigil_flutter
        flutter build web --base-href /app/ --wasm --output ../sigil_server/web/app
